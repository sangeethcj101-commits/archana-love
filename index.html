<!DOCTYPE html>
<html>
<head>
<title>For Archana Vinod</title>

<style>
body{
  margin:0;
  padding:40px;
  text-align:center;
  color:white;
  font-family:Arial;
  background-image:url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564");
  background-size:cover;
  background-position:center;
  overflow-x:hidden;
}

@keyframes glow{
  0%{text-shadow:0 0 10px white;}
  50%{text-shadow:0 0 25px #00ffff,0 0 40px #00ffff;}
  100%{text-shadow:0 0 10px white;}
}

h1{
  font-size:65px;
  animation:glow 2s infinite;
}

p{
  font-size:18px;
  animation:glow 3s infinite;
  font-family:"Arial", sans-serif;
}

button{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:#ff4b7d;
  color:white;
  cursor:pointer;
  margin-top:20px;
}

button:hover{background:#ff1e60;}

#surprise{
  font-size:35px;
  margin-top:30px;
  animation:glow 2s infinite;
  display:none;
}

.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:0;
  animation:fall 3s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10px) rotate(0deg);}
  100%{transform:translateY(100vh) rotate(360deg);}
}

.photo{
  width:320px;
  border-radius:20px;
  box-shadow:0 0 30px white;
  margin-top:50px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<!-- 1️⃣ Play Music button at the top -->
<button id="playButton">
🎵 Play Music ❤️
</button>

<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const playBtn = document.getElementById("playButton");
const song = document.getElementById("song");

playBtn.addEventListener("click", function() {
  song.play();              // Play the music
  playBtn.style.display = "none";  // Hide the button
});
</script>

<img src="archana.jpg" class="photo">

  document.getElementById("surprise").style.display="block";
}

// Confetti
for(let i = 0; i < 40; i++){
  let conf = document.createElement("div");
  conf.className = "confetti";
  conf.style.left = Math.random() * 100 + "vw";

</body>
</html>
